# Tiling Shell settings, applied with:
#   dconf load /org/gnome/shell/extensions/tilingshell/ < dconf/tilingshell.conf
#
# Tuned for an ultrawide (e.g. 5120x1440). Keyboard mapping (Windows-like):
#   Super + Left   -> left 25% tile
#   Super + Right  -> right 25% tile
#   Super + Up     -> centre the window (the 50% middle tile)
#   Super + Down   -> span all tiles (full width)
# Mouse: drag to a screen edge to snap (active-screen-edges); the Snap
# Assistant appears at the top while dragging.
#
# To re-capture after tweaking layouts in the Tiling Shell editor:
#   dconf dump /org/gnome/shell/extensions/tilingshell/ > dconf/tilingshell.conf
[/]
active-screen-edges=true
enable-move-keybindings=true
enable-snap-assist=true
enable-tiling-system=true
enable-span-multiple-tiles=true
inner-gaps=uint32 8
outer-gaps=uint32 8
show-indicator=true
selected-layouts=['Ultrawide 25-50-25']
layouts-json='[{"id":"Ultrawide 25-50-25","tiles":[{"x":0,"y":0,"width":0.25,"height":1,"groups":[1]},{"x":0.25,"y":0,"width":0.5,"height":1,"groups":[1,2]},{"x":0.75,"y":0,"width":0.25,"height":1,"groups":[2]}]},{"id":"Centre 66 + sides","tiles":[{"x":0,"y":0,"width":0.17,"height":1,"groups":[1]},{"x":0.17,"y":0,"width":0.66,"height":1,"groups":[1,2]},{"x":0.83,"y":0,"width":0.17,"height":1,"groups":[2]}]},{"id":"Thirds","tiles":[{"x":0,"y":0,"width":0.3333,"height":1,"groups":[1]},{"x":0.3333,"y":0,"width":0.3334,"height":1,"groups":[1,2]},{"x":0.6667,"y":0,"width":0.3333,"height":1,"groups":[2]}]}]'
move-window-left=['<Super>Left']
move-window-right=['<Super>Right']
move-window-up=['']
move-window-down=['']
move-window-center=['<Super>Up']
span-window-all-tiles=['<Super>Down']
