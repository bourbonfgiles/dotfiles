# Dash to Dock settings, applied with:
#   dconf load /org/gnome/shell/extensions/dash-to-dock/ < dconf/dash-to-dock.conf
#
# Behaviour: dock is hidden by default and slides up when the pointer reaches
# the bottom edge. It floats OVER windows instead of reserving space, so showing
# or hiding it never resizes/"wiggles" your maximized or tiled windows.
#   dock-fixed=false  + autohide=true  -> hidden, reveal on hover, overlay
#   intellihide=false                  -> always hidden (not just when covered)
#   require-pressure-to-show=false     -> reveal on plain mouse-over (no push)
#
# Capture your own tweaks with:
#   dconf dump /org/gnome/shell/extensions/dash-to-dock/ > dconf/dash-to-dock.conf
[/]
dock-position='BOTTOM'
dock-fixed=false
autohide=true
intellihide=false
require-pressure-to-show=false
extend-height=false
show-trash=false
show-mounts=false
click-action='minimize-or-previews'
